[package]
name = "kontur-tui"
version = "0.1.0"
edition = "2021"

[dependencies]
kontur-core = { path = "../kontur-core" }
kontur-mcp = { path = "../kontur-mcp" }
kontur-net = { path = "../kontur-net" }
ratatui = "0.30"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }

[[bin]]
name = "kontur"
path = "src/bin/kontur.rs"
